name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run unit tests
        run: deno task test

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run type check
        run: deno task check

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run lint
        run: deno lint

      - name: Run format check
        run: deno fmt --check .

  sqlite-integration:
    name: SQLite Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run SQLite integration tests
        run: deno task test:integration:sqlite

  fs-integration:
    name: Filesystem Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run filesystem integration tests
        run: deno task test:integration:fs

  postgres-integration:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: b3nd_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Postgres integration tests
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:55432/b3nd_test
        run: deno task test:integration:postgres

  mongo-integration:
    name: MongoDB Integration
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 57017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run MongoDB integration tests
        env:
          MONGODB_URL: mongodb://localhost:57017/b3nd_test
        run: deno task test:integration:mongo

  ipfs-integration:
    name: IPFS Integration
    runs-on: ubuntu-latest

    steps:
      - name: Start Kubo IPFS
        run: |
          docker run -d --name ipfs \
            -p 55001:5001 \
            ipfs/kubo:v0.32.1

          for i in {1..30}; do
            if curl -sf -X POST http://localhost:55001/api/v0/id > /dev/null 2>&1; then
              echo "IPFS is ready"
              break
            fi
            echo "Waiting for IPFS... ($i/30)"
            sleep 2
          done

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run IPFS integration tests
        env:
          IPFS_API_URL: http://localhost:55001
        run: deno task test:integration:ipfs

  s3-integration:
    name: S3 (MinIO) Integration
    runs-on: ubuntu-latest

    steps:
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 59000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data

          for i in {1..30}; do
            if curl -sf http://localhost:59000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 1
          done

      - name: Create test bucket (public read+write)
        run: |
          docker run --rm --net=host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:59000 \
            minio/mc mb local/b3nd-inttest || true
          docker run --rm --net=host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:59000 \
            minio/mc anonymous set public local/b3nd-inttest

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run S3 integration tests
        env:
          S3_ENDPOINT: http://localhost:59000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
        run: deno task test:integration:s3
